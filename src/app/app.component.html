<h1>Hello, Kin OCR</h1>

<app-file-upload (fileLoaded)="onFileLoaded($event)"></app-file-upload>

<div *ngIf="csvContent" style="margin-top: 1rem; color: #888;">
  <strong>Raw CSV Content:</strong>
  <pre>{{ csvContent }}</pre>
</div>

<table *ngIf="tableData.length > 0" border="1" cellpadding="8" style="margin-top: 2rem; min-width: 400px;">
  <thead>
    <tr>
      <th>ID</th>
      <th>Policy Number</th>
      <th>Result</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let row of tableData; let i = index">
      <td>{{ i + 1 }}</td>
      <td>
        {{ row.policyNumber }}
        <span *ngIf="row.isDuplicate" title="Duplicate" style="color: red;">🚩</span>
      </td>
      <td>
        <span [ngStyle]="{
          color: row.result === 'INVALID' ? 'orange' : (row.result === 'ERROR' ? 'red' : 'inherit')
        }">
          {{ row.result }}
        </span>
      </td>
    </tr>
  </tbody>
</table>

<div style="margin: 1rem 0 0.5rem 0;" *ngIf="hasDuplicatePolicy">
  <span style="color: red; font-size: 1.2em;">🚩</span>
  <span style="margin-left: 0.5em;">Duplicate policy number</span>
</div>

<button
  *ngIf="hasValidPolicy"
  type="button"
  (click)="submitPolicies()"
  [disabled]="isSubmitting"
  style="margin-top: 1rem;"
>
  {{ isSubmitting ? 'Submitting...' : 'Submit Policies' }}
</button>

<div *ngIf="postResult" style="margin-top: 1rem;">
  <span *ngIf="postResult.success" style="color: green;">
    Success! ID: {{ postResult.id }}
  </span>
  <span *ngIf="!postResult.success" style="color: red;">
    {{ postResult.error }}
  </span>
</div>
